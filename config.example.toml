# ledger configuration. Secrets NEVER live here — they come from the
# environment / systemd credentials (see deploy/README.md).

[server]
listen   = "127.0.0.1:8080"   # bound to localhost; Tailscale/Caddy fronts HTTPS
data_dir = "/var/lib/ledger"  # SQLite file lives here (ledger.db)

# --- IMAP ingest (active as of Milestone 2). Leave [imap] unset/host empty ---
# --- to run without ingestion (API + PWA only).                           ---

[imap]
host          = "imap.gmail.com"        # dedicated mailbox provider
port          = 993                     # implicit TLS (IMAPS); cert is verified
username      = "salehledgerbank@gmail.com"
auth          = "app_password"          # "app_password" (only supported in M2) | "oauth2" (later)
folder        = "INBOX"
read_only     = true                    # opened with EXAMINE; the app can never alter mail
use_idle      = false                   # reserved; Milestone 2 is poll-only
poll_interval = "60s"
# Secret is NEVER stored here. Set it in the environment / systemd:
#   LEDGER_IMAP_APP_PASSWORD = the 16-char Gmail App Password

# --- The sections below are consumed by later milestones (§7 of the build ---
# --- plan). They are inert today and shown here for reference.            ---

[ai]
# Set enabled=true and LEDGER_AI_API_KEY env var to activate AI categorization.
# AI never auto-confirms without reaching auto_accept_threshold.
enabled               = false
model                 = "claude-haiku-4-5-20251001"   # cheapest model; good for single merchants
auto_accept_threshold = 0.85                           # >= this → confirmed + rule proposed
auto_rule             = false                          # true = write rule without user tap
allow_ai_extraction   = true                           # let AI be the last-resort parse tier
# Secret: LEDGER_AI_API_KEY=sk-ant-...

# [budget]
# currency       = "AED"
# monthly_income = 0
# income_source  = "config"
# need_pct       = 0.50
# want_pct       = 0.30
# saving_pct     = 0.20
# freeze_history = false

[monitoring]
drift_window = "7d"   # rolling window for per-sender parse-success tracking
drift_min    = 0.80   # alert if a sender's parse-success drops below this fraction
